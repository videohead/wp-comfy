services:
  wordpress:
    image: wordpress:7.0-php8.2-apache
    container_name: wordpress
    restart: always
    environment:
      WORDPRESSDBHOST: db
      WORDPRESSDBUSER: /run
      WORDPRESSDBPASSWORD: /run/secrets/wp_databasepassword
      WORDPRESSDBNAME: /run/secrets/wp_databasename
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - /opt/wp-comfy/wp-data:/var/www/html

  db:
    image: mariadb:10.6
    container_name: wordpress-db
    restart: always
    environment:
      MARIADB_DATABASE: /run/secrets/db_name
      MARIADB_USERNAME: /run/secrets/db_username
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MARIADB_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - /opt/wp-comfy/db-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "0.0.0.0:6379:6379"

  python-orchestrator:
    build:
      context: /opt/wp-comfy/orchestrator
      dockerfile: Dockerfile
    container_name: python-orchestrator
    restart: always
    environment:
      WORDPRESS_URL: http://wordpress
      WORDPRESS_USER: /run/secrets/wp_username
      WORDPRESSAPPPASSWORD: /run/secrets/wp_password
      REDIS_URL: redis://redis:6379/0
      COMFYUI_URL: http://127.0.0.1:8188
    depends_on:
      - wordpress
      - redis
#      - comfyui
    ports:
      - "0.0.0.0:8000:8000"  # FastAPI/Flask

  celery-worker:
    build:
      context: /opt/wp-comfy/orchestrator
      dockerfile: Dockerfile
    container_name: celery-worker
    restart: always
    environment:
      WORDPRESS_URL: http://wordpress:8080
      WORDPRESS_USER: /run/secrets/wp_username
      WORDPRESSAPPPASSWORD: /run/secrets/wp_password
      REDIS_URL: redis://redis:6379/0
      COMFYUI_URL: http://127.0.0.1:8188
    depends_on:
      - redis
#      - comfyui
    command: >
      celery -A tasks.celery_app worker

